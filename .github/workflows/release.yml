name: Release

# Tag and release based on the version in manifest.json:
#  * push to main  -> release  v<version>            (created once per version bump)
#  * push to any   -> pre-release  v<version>-<branch>.<run_number>
#    other branch
on:
  push:
    branches: ["**"]

permissions:
  contents: write

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: manifest
        run: |
          VERSION=$(python -c "import json; print(json.load(open('custom_components/swiss_ev_charging/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute tag
        id: tag
        run: |
          VERSION="${{ steps.manifest.outputs.version }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            # Slugify the branch name for a valid, readable pre-release tag.
            SLUG=$(echo "${{ github.ref_name }}" | tr '/_' '--' | tr -cd 'a-zA-Z0-9.-')
            echo "tag=v${VERSION}-${SLUG}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release if the tag does not yet exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          FLAGS="--generate-notes --target ${{ github.sha }} --title $TAG"
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            FLAGS="$FLAGS --prerelease"
          fi
          gh release create "$TAG" $FLAGS
