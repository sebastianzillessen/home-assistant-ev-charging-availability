name: Update feed schema

# Weekly (and on demand) regenerate the JSON schema of the two live SFOE feeds.
# If the upstream structure changed, the generated files under schemas/ differ
# and a pull request is opened automatically for review.
on:
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  schema:
    name: Regenerate feed schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install genson
      - name: Regenerate schemas from the live feeds
        run: python scripts/generate_evse_schema.py
      - name: Open a pull request if the schema changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-evse-schema
          delete-branch: true
          commit-message: "chore: update EVSE feed JSON schema"
          title: "Upstream EVSE feed schema changed"
          body: |
            The scheduled schema check detected a change in the structure of the
            SFOE / ich-tanke-strom OICP feeds.

            The generated JSON schema under `schemas/` has been updated. Review
            the diff to see which fields or types changed, and update the parser
            in `custom_components/swiss_ev_charging/api.py` if needed.

            _Opened automatically by the weekly `Update feed schema` workflow._
          labels: automated, upstream-change
          assignees: sebastianzillessen
          reviewers: sebastianzillessen
